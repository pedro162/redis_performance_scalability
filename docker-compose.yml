services:
  redis-estudos:
    image: redis:latest
    container_name: meu-redis
    env_file:
      - .env
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - ./dados:/data
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
